<style>
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: #FAF7F2; font-family: "DM Sans", sans-serif; color: #3A3530; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }

.fade-in-section { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in-section.visible { opacity: 1; transform: none; }

.product-card:hover .card-img { transform: scale(1.04); }
.product-card:hover { box-shadow: 0 12px 40px rgba(42,124,118,0.13); }
.product-card { transition: box-shadow 0.3s ease; }
.card-img { transition: transform 0.45s ease; }

.modal-overlay { animation: fadeInOverlay 0.25s ease forwards; }
@keyframes fadeInOverlay { from { opacity:0 } to { opacity:1 } }
.modal-box { animation: scaleInBox 0.3s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes scaleInBox { from { opacity:0; transform: scale(0.88) } to { opacity:1; transform: scale(1) } }

.nav-link { position: relative; contain: layout; }
.nav-link::after { content:''; position:absolute; bottom:-3px; left:0; width:0; height:1.5px; background:#2A7C76; transition: width 0.3s ease; }
.nav-link:hover::after { width:100%; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #FAF7F2; }
::-webkit-scrollbar-thumb { background: #2A7C76; border-radius: 3px; }

.paint-blob {
  position: absolute;
  border-radius: 60% 40% 70% 30% / 50% 60% 40% 70%;
  opacity: 0.07;
  animation: floatBlob 9s ease-in-out infinite;
  will-change: transform;
  transform: translateZ(0);
}
@keyframes floatBlob {
  0%,100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 70%; transform: translate(0,0) rotate(0deg); }
  33% { border-radius: 70% 30% 50% 50% / 30% 60% 70% 40%; transform: translate(12px,-18px) rotate(6deg); }
  66% { border-radius: 40% 60% 30% 70% / 60% 40% 60% 50%; transform: translate(-8px,10px) rotate(-4deg); }
}

.whatsapp-btn { transition: all 0.25s ease; }
.whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(42,124,118,0.3); }

.star { color: #E8735A; }

@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(24px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes floatSlow {
  0%,100% { transform: translateY(0px) rotate(-2deg); }
  50% { transform: translateY(-14px) rotate(2deg); }
}
</style>

// -- Intersection observer hook --
function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
      { threshold: 0.12 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

// -- Product Modal --
function ProductModal({ product, onClose }) {
  const [imgIdx, setImgIdx] = useState(0);
  const touchStartX = useRef(null);

  const extraImages = product.image === 'animals'
    ? [ANIMALS_COLORED, IMAGES[product.image]]
    : product.image === 'insects'
    ? [INSECTS_COLORED, IMAGES[product.image]]
    : [null, null];

  const allImages = product.image === 'animals'
    ? [ANIMALS_WHITE, ANIMALS_COLORED, IMAGES[product.image]]
    : product.image === 'insects'
    ? [INSECTS_WHITE, INSECTS_COLORED, IMAGES[product.image]]
    : product.image === 'vehicles'
    ? [VEHICLES_WHITE1, VEHICLES_WHITE2, IMAGES[product.image]]
    : product.image === 'alphabets'
    ? [ALPHA1, ALPHA2, IMAGES[product.image]]
    : product.image === 'biganimals'
    ? [BIGANIMALS_THUMB, BIGANIMALS_SEC]
    : product.image === 'kitty'
    ? [KITTY_WHITE, IMAGES[product.image], null]
    : product.image === 'flowers'
    ? [FLOWERS_COLORED, IMAGES[product.image], null]
    : [IMAGES[product.image], null, null];

  const totalSlides = allImages.length;

  // Preload all carousel images immediately — eliminates swipe/arrow delay
  useEffect(() => {
    allImages.forEach(src => { if (src) { const img = new Image(); img.src = src; } });
  }, []);

  const prev = () => setImgIdx(i => (i - 1 + totalSlides) % totalSlides);
  const next = () => setImgIdx(i => (i + 1) % totalSlides);

  const onTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const diff = touchStartX.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) { diff > 0 ? next() : prev(); }
    touchStartX.current = null;
  };

  useEffect(() => {
    // Lock scroll without layout shift
    const sbw = window.innerWidth - document.documentElement.clientWidth;
    document.body.style.overflow = 'hidden';
    if (sbw > 0) document.body.style.paddingRight = sbw + 'px';
    return () => { document.body.style.overflow = ''; document.body.style.paddingRight = ''; };
  }, []);

  return (
    <div className="modal-overlay fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
         onClick={e => { if(e.target === e.currentTarget) onClose(); }}>
      <div className="modal-box bg-white rounded-3xl max-w-2xl w-full overflow-hidden shadow-2xl max-h-[90vh] flex flex-col" style={{willChange:"transform",transform:"translateZ(0)"}}>
        {/* Image area */}
        <div className="relative bg-gray-50 h-64 select-none" style={{transform:"translateZ(0)",backfaceVisibility:"hidden"}}
             onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
          {allImages[imgIdx] ? (
            <img src={allImages[imgIdx]} alt={product.name} className="w-full h-full object-contain p-4" draggable="false" decoding="async"/>
          ) : (
            <div className="w-full h-full flex items-center justify-center text-warm-gray-light font-dm text-sm">
              {/* Add real product photo here */}
              <div className="text-center">
                <div className="text-4xl mb-2">📸</div>
                <div>Product photo coming soon</div>
              </div>
            </div>
          )}
          {/* Close button */}
          <button onClick={onClose} className="absolute top-4 right-4 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow-md text-warm-gray hover:text-gray-800 transition-colors text-lg z-10">×</button>
          {/* Left arrow */}
          <button onClick={prev} className="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full w-8 h-8 flex items-center justify-center shadow text-warm-gray hover:text-teal transition-all z-10 text-lg">‹</button>
          {/* Right arrow */}
          <button onClick={next} className="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white rounded-full w-8 h-8 flex items-center justify-center shadow text-warm-gray hover:text-teal transition-all z-10 text-lg">›</button>
          {/* Dot indicators */}
          <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-2">
            {allImages.map((_, i) => (
              <button key={i} onClick={() => setImgIdx(i)}
                      className={`h-2 rounded-full transition-all duration-300 ${imgIdx === i ? 'bg-teal w-5' : 'bg-gray-300 hover:bg-gray-400 w-2'}`}/>
            ))}
          </div>
        </div>
        {/* Content */}
        <div className="p-6 overflow-y-auto">
          <span className="font-dm text-coral text-xs font-medium tracking-widest uppercase">DIY Painting Kit</span>
          <h3 className="font-playfair text-2xl font-bold text-gray-800 mt-1 mb-1">{product.name}</h3>
          <p className="font-dm text-warm-gray-light text-sm mb-4">{product.subtitle}</p>
          <p className="font-dm text-warm-gray text-sm leading-relaxed mb-6">{product.desc}</p>

          {/* Price & CTA */}
          <div className="flex items-center justify-between">
            <div>
              <div className="font-dm text-xs text-warm-gray-light mb-0.5">Price (with magnet)</div>
              <div className="font-playfair text-3xl font-bold text-teal">₹{product.price}</div>
              <div className="font-dm text-xs text-warm-gray-light">per piece · magnet included</div>
            </div>
            <a href={waLink(product.name, true)} target="_blank" rel="noopener noreferrer"
               className="whatsapp-btn bg-teal text-white font-dm font-medium px-6 py-3.5 rounded-full flex items-center gap-2.5 shadow-md">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.528 5.855L.057 23.857a.5.5 0 00.623.59l6.188-1.622A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.883a9.87 9.87 0 01-5.032-1.373l-.36-.214-3.732.978.995-3.636-.235-.375A9.884 9.884 0 012.12 12c0-5.448 4.432-9.88 9.88-9.88s9.88 4.432 9.88 9.88-4.432 9.88-9.88 9.88z"/></svg>
